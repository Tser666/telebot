# 前端 Nginx 站点配置
# - 静态资源使用 SPA fallback（任何未匹配的路径都回退到 index.html）
# - PWA 入口与 service worker 禁止缓存，避免移动端安装后长期持有旧 bundle
# - /api/ 反向代理至后端容器 web:8000
# - /healthz 直接透传到后端，便于外部探活

map $uri $telepilot_cache_control {
    default "no-cache, no-store, must-revalidate";
    ~^/assets/ "public, max-age=31536000, immutable";
    ~^/(apple-touch-icon|brand-logo|favicon-16x16|favicon-32x32|pwa-192x192|pwa-512x512|pwa-maskable-512x512)\.png$ "public, max-age=604800";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源：单页应用 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API
    location /api/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 健康检查直接透传
    location /healthz {
        proxy_pass http://web:8000/healthz;
    }

    # 备份/恢复时可能上传较大文件，放宽至 50M
    client_max_body_size 50M;

    # 启用 gzip，常见文本类型压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 低风险高收益安全头；HSTS 建议放在公网 HTTPS 反代层统一配置
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header Cache-Control $telepilot_cache_control always;
}
